<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机决策助手 Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部下拉切换 */
        .header {
            padding: 20px;
            background: var(--primary);
            color: white;
            text-align: center;
        }

        .mode-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            margin-top: 10px;
            background: rgba(255,255,255,0.9);
            color: var(--text);
            outline: none;
            cursor: pointer;
        }

        /* 内容区域 */
        .content {
            padding: 24px;
            flex: 1;
        }

        .feature-panel {
            display: none; /* 默认隐藏 */
            animation: fadeIn 0.3s ease;
        }

        .feature-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 通用组件样式 */
        h2 { margin-top: 0; font-size: 20px; color: var(--primary); }
        .result-box {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: var(--text);
            min-height: 48px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-secondary:hover { background: #dc2626; }
        .btn-rethink {
            width: 100%;
            padding: 12px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            display: none;
        }
        .btn-rethink:hover { background: #d97706; }
        .analysis-text {
            font-size: 14px;
            color: #f59e0b;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .hourglass-container {
            width: 160px;
            height: 240px;
            margin: 0 auto 20px;
            position: relative;
        }
        .hourglass-body {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .hourglass-cap {
            position: absolute;
            width: 100%;
            height: 16px;
            background: var(--primary);
            border-radius: 6px;
            z-index: 5;
        }
        .hourglass-cap-top {
            top: 0;
        }
        .hourglass-cap-bottom {
            bottom: 0;
        }
        .hourglass-glass {
            position: absolute;
            top: 16px;
            width: 100%;
            height: calc(100% - 32px);
            border: 3px solid var(--primary);
        }
        .hourglass-top-glass {
            top: 0;
            height: 50%;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            background: rgba(243, 244, 246, 0.3);
        }
        .hourglass-bottom-glass {
            top: 50%;
            height: 50%;
            clip-path: polygon(50% 0, 0 100%, 100% 100%);
            background: rgba(243, 244, 246, 0.3);
        }
        .hourglass-sand-top {
            position: absolute;
            top: 16px;
            left: 0;
            width: 100%;
            height: 50%;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            overflow: hidden;
        }
        .hourglass-sand-top-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), #818cf8);
            transform-origin: bottom;
            transition: transform 1s linear;
        }
        .hourglass-sand-bottom {
            position: absolute;
            bottom: 16px;
            left: 0;
            width: 100%;
            height: 50%;
            clip-path: polygon(50% 0, 0 100%, 100% 100%);
            overflow: hidden;
        }
        .hourglass-sand-bottom-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--primary), #818cf8);
            transition: height 1s linear;
        }
        .hourglass-stream {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 0;
            background: linear-gradient(to bottom, var(--primary), #818cf8);
            z-index: 3;
            transition: height 1s linear;
        }
        .hourglass-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            z-index: 10;
            background: rgba(255,255,255,0.95);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .sand-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--primary);
            border-radius: 50%;
            animation: sandFall 1.5s linear infinite;
        }
        @keyframes sandFall {
            0% { 
                transform: translateY(0) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(100px) scale(0.3); 
                opacity: 0; 
            }
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #666; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="range"] { width: 100%; }

        /* 转盘特定样式 */
        .wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 20px;
        }
        #wheelCanvas {
            width: 100%;
            height: 100%;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); /* 模拟物理惯性 */
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ef4444;
            z-index: 2;
        }

        /* 标签组 */
        .tag-input { display: flex; gap: 5px; margin-bottom: 10px; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .tag { background: #e0e7ff; color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .tag span { cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3>🎲 随机决策助手</h3>
        <select class="mode-select" id="modeSwitcher">
            <option value="randomNum">0-100 随机数</option>
            <option value="coinFlip">抛硬币 Pro (权重版)</option>
            <option value="diceRoll">投骰子</option>
            <option value="hourglass">沙漏倒计时</option>
            <option value="wheel">多选项大转盘</option>
            <option value="timeBox">时间盲盒 (拖延终结者)</option>
        </select>
    </div>

    <div class="content">
        <!-- 1. 0-100 随机数 -->
        <div id="randomNum" class="feature-panel active">
            <h2>0-100 随机数</h2>
            <div class="result-box" id="rnResult">-</div>
            <button class="btn" onclick="generateRandomNum()">生成随机数</button>
        </div>

        <!-- 2. 抛硬币 Pro -->
        <div id="coinFlip" class="feature-panel">
            <h2>抛硬币 Pro (权重随机)</h2>
            <div class="input-group">
                <label>选项 A</label>
                <input type="text" id="coinA" value="方案 A">
            </div>
            <div class="input-group">
                <label>选项 B</label>
                <input type="text" id="coinB" value="方案 B">
            </div>
            <div class="input-group">
                <label>直觉权重：偏向 A 的概率 (<span id="weightVal">50</span>%)</label>
                <input type="range" id="weightRange" min="0" max="100" value="50" oninput="document.getElementById('weightVal').innerText = this.value">
            </div>
            <div class="result-box" id="coinResult">?</div>
            <button class="btn" onclick="flipCoin()">开始决策</button>
            <button class="btn-rethink" id="coinRethinkBtn" onclick="showCoinAnalysis()">😐 不满意，再想想</button>
            <div class="analysis-text" id="coinAnalysis"></div>
        </div>

        <!-- 3. 投骰子 -->
        <div id="diceRoll" class="feature-panel">
            <h2>🎲 投骰子 (决策辅助版)</h2>
            <div class="input-group">
                <label>选项 1</label>
                <input type="text" id="diceOpt1" value="选项 1">
            </div>
            <div class="input-group">
                <label>选项 2</label>
                <input type="text" id="diceOpt2" value="选项 2">
            </div>
            <div class="input-group">
                <label>选项 3</label>
                <input type="text" id="diceOpt3" value="选项 3">
            </div>
            <div class="input-group">
                <label>选项 4</label>
                <input type="text" id="diceOpt4" value="选项 4">
            </div>
            <div class="input-group">
                <label>选项 5</label>
                <input type="text" id="diceOpt5" value="选项 5">
            </div>
            <div class="input-group">
                <label>选项 6</label>
                <input type="text" id="diceOpt6" value="选项 6">
            </div>
            <div class="result-box" id="diceResult">?</div>
            <button class="btn" onclick="rollDice()">投掷骰子</button>
            <button class="btn-rethink" id="diceRethinkBtn" onclick="showDiceAnalysis()">😐 不满意，再想想</button>
            <div class="analysis-text" id="diceAnalysis"></div>
        </div>

        <!-- 4. 沙漏倒计时 -->
        <div id="hourglass" class="feature-panel">
            <h2>⏳ 沙漏倒计时</h2>
            <div class="input-group">
                <label>设置时长（分钟）</label>
                <input type="number" id="hourglassMinutes" value="5" min="1" max="120">
            </div>
            <div class="hourglass-container">
                <div class="hourglass-body">
                    <div class="hourglass-cap hourglass-cap-top"></div>
                    <div class="hourglass-glass hourglass-top-glass">
                        <div class="hourglass-sand-top">
                            <div class="hourglass-sand-top-fill" id="hourglassSandTopFill"></div>
                        </div>
                    </div>
                    <div class="hourglass-glass hourglass-bottom-glass">
                        <div class="hourglass-sand-bottom">
                            <div class="hourglass-sand-bottom-fill" id="hourglassSandBottomFill"></div>
                        </div>
                    </div>
                    <div class="hourglass-stream" id="hourglassStream"></div>
                    <div class="hourglass-cap hourglass-cap-bottom"></div>
                </div>
                <div class="hourglass-text" id="hourglassDisplay">⏳</div>
            </div>
            <button class="btn" id="hourglassStartBtn" onclick="startHourglass()">开始倒计时</button>
            <button class="btn-secondary" id="hourglassResetBtn" onclick="resetHourglass()" style="display:none;">重置</button>
        </div>

        <!-- 5. 多选项转盘 -->
        <div id="wheel" class="feature-panel">
            <h2>幸运大转盘</h2>
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
            </div>
            <div class="result-box" id="wheelResult" style="font-size: 24px;">准备就绪</div>
            
            <div class="tag-input">
                <input type="text" id="newOption" placeholder="输入选项 (如: 方案C)">
                <button class="btn" style="width: auto;" onclick="addOption()">添加</button>
            </div>
            <div class="tag-list" id="optionList"></div>
            <button class="btn" onclick="spinWheel()">开始旋转</button>
        </div>

        <!-- 6. 时间盲盒 -->
        <div id="timeBox" class="feature-panel">
            <h2>时间盲盒 (拖延终结者)</h2>
            <div class="input-group">
                <label>你要做什么任务？</label>
                <input type="text" id="taskName" placeholder="例如：写周报、背单词">
            </div>
            <div class="result-box" id="timeResult">-- 分钟</div>
            <p style="font-size: 14px; color: #666; text-align: center;">既然是随机的，那就接受它，立刻开始行动！</p>
            <button class="btn" onclick="generateTimeBox()">抽取专注时长</button>
        </div>
    </div>
</div>

<script>
    // --- 页面切换逻辑 ---
    const switcher = document.getElementById('modeSwitcher');
    const panels = document.querySelectorAll('.feature-panel');

    switcher.addEventListener('change', (e) => {
        panels.forEach(panel => panel.classList.remove('active'));
        document.getElementById(e.target.value).classList.add('active');
    });

    // --- 1. 0-100 随机数 ---
    function generateRandomNum() {
        const resultEl = document.getElementById('rnResult');
        // 简单的数字跳动动画
        let count = 0;
        const interval = setInterval(() => {
            resultEl.innerText = Math.floor(Math.random() * 101);
            count++;
            if (count > 10) {
                clearInterval(interval);
                resultEl.innerText = Math.floor(Math.random() * 101);
            }
        }, 50);
    }

    // --- 2. 抛硬币 Pro (权重) ---
    let coinFlipCount = 0;
    let lastCoinResult = '';

    function flipCoin() {
        const optA = document.getElementById('coinA').value || '方案 A';
        const optB = document.getElementById('coinB').value || '方案 B';
        const weight = parseInt(document.getElementById('weightRange').value);
        const resultEl = document.getElementById('coinResult');
        const rethinkBtn = document.getElementById('coinRethinkBtn');
        const analysisEl = document.getElementById('coinAnalysis');

        resultEl.innerText = "思考中...";
        rethinkBtn.style.display = 'none';
        analysisEl.style.display = 'none';
        
        setTimeout(() => {
            const rand = Math.random();
            const threshold = weight / 100;
            
            const winner = rand < threshold ? optA : optB;
            resultEl.innerText = winner;
            resultEl.style.color = rand < threshold ? '#6366f1' : '#ef4444';
            
            lastCoinResult = winner;
            coinFlipCount++;
            
            rethinkBtn.style.display = 'block';
        }, 600);
    }

    function showCoinAnalysis() {
        const optA = document.getElementById('coinA').value || '方案 A';
        const optB = document.getElementById('coinB').value || '方案 B';
        const analysisEl = document.getElementById('coinAnalysis');
        const rethinkBtn = document.getElementById('coinRethinkBtn');
        
        const otherOption = lastCoinResult === optA ? optB : optA;
        
        analysisEl.innerText = `看来你潜意识里并不想要「${lastCoinResult}」，不如直接选「${otherOption}」吧！`;
        analysisEl.style.display = 'block';
        rethinkBtn.style.display = 'none';
    }

    // --- 4. 沙漏倒计时 ---
    let hourglassTimer = null;
    let hourglassTotalSeconds = 0;
    let hourglassRemainingSeconds = 0;
    let particleInterval = null;

    function startHourglass() {
        const minutesInput = document.getElementById('hourglassMinutes');
        const displayEl = document.getElementById('hourglassDisplay');
        const sandTopFill = document.getElementById('hourglassSandTopFill');
        const sandBottomFill = document.getElementById('hourglassSandBottomFill');
        const streamEl = document.getElementById('hourglassStream');
        const startBtn = document.getElementById('hourglassStartBtn');
        const resetBtn = document.getElementById('hourglassResetBtn');

        if (hourglassTimer) {
            return;
        }

        const minutes = parseInt(minutesInput.value) || 5;
        hourglassTotalSeconds = minutes * 60;
        hourglassRemainingSeconds = hourglassTotalSeconds;

        startBtn.style.display = 'none';
        resetBtn.style.display = 'block';
        minutesInput.disabled = true;

        // 初始化沙漏状态
        sandTopFill.style.transform = 'scaleY(1)';
        sandBottomFill.style.height = '0%';
        streamEl.style.height = '120px';

        // 创建颗粒动画
        startParticles();

        hourglassTimer = setInterval(() => {
            hourglassRemainingSeconds--;
            
            const elapsed = hourglassTotalSeconds - hourglassRemainingSeconds;
            const progress = elapsed / hourglassTotalSeconds;
            
            // 更新沙漏动画
            sandTopFill.style.transform = `scaleY(${1 - progress})`;
            sandBottomFill.style.height = `${progress * 100}%`;

            if (hourglassRemainingSeconds <= 0) {
                clearInterval(hourglassTimer);
                hourglassTimer = null;
                stopParticles();
                displayEl.innerText = '⏰';
                sandTopFill.style.transform = 'scaleY(0)';
                sandBottomFill.style.height = '100%';
                streamEl.style.height = '0';
                alert('⏰ 时间到！');
                resetBtn.style.display = 'block';
                startBtn.style.display = 'block';
                minutesInput.disabled = false;
                return;
            }

            const hours = Math.floor(hourglassRemainingSeconds / 3600);
            const mins = Math.floor((hourglassRemainingSeconds % 3600) / 60);
            const secs = hourglassRemainingSeconds % 60;
            
            if (hours > 0) {
                displayEl.innerText = `${hours}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            } else {
                displayEl.innerText = `${mins}:${String(secs).padStart(2, '0')}`;
            }
        }, 1000);
    }

    function startParticles() {
        const container = document.querySelector('.hourglass-container');
        // 清理旧颗粒
        container.querySelectorAll('.sand-particle').forEach(p => p.remove());
        
        particleInterval = setInterval(() => {
            const particle = document.createElement('div');
            particle.className = 'sand-particle';
            particle.style.left = `${48 + Math.random() * 4}%`;
            particle.style.top = '50%';
            particle.style.animationDelay = `${Math.random() * 0.5}s`;
            container.appendChild(particle);
            
            // 动画结束后移除颗粒
            setTimeout(() => {
                if (particle.parentNode) {
                    particle.remove();
                }
            }, 1500);
        }, 200);
    }

    function stopParticles() {
        if (particleInterval) {
            clearInterval(particleInterval);
            particleInterval = null;
        }
        // 清理所有颗粒
        document.querySelectorAll('.sand-particle').forEach(p => p.remove());
    }

    function resetHourglass() {
        if (hourglassTimer) {
            clearInterval(hourglassTimer);
            hourglassTimer = null;
        }
        stopParticles();

        const displayEl = document.getElementById('hourglassDisplay');
        const sandTopFill = document.getElementById('hourglassSandTopFill');
        const sandBottomFill = document.getElementById('hourglassSandBottomFill');
        const streamEl = document.getElementById('hourglassStream');
        const startBtn = document.getElementById('hourglassStartBtn');
        const resetBtn = document.getElementById('hourglassResetBtn');
        const minutesInput = document.getElementById('hourglassMinutes');

        displayEl.innerText = '⏳';
        sandTopFill.style.transform = 'scaleY(1)';
        sandBottomFill.style.height = '0%';
        streamEl.style.height = '0';
        startBtn.style.display = 'block';
        resetBtn.style.display = 'none';
        minutesInput.disabled = false;
        hourglassRemainingSeconds = 0;
    }

    // --- 5. 投骰子 (决策辅助) ---
    let lastDiceResult = '';
    let lastDiceNumber = 0;

    function rollDice() {
        const diceOptions = [];
        for (let i = 1; i <= 6; i++) {
            const opt = document.getElementById(`diceOpt${i}`).value || `选项 ${i}`;
            diceOptions.push(opt);
        }
        
        const resultEl = document.getElementById('diceResult');
        const rethinkBtn = document.getElementById('diceRethinkBtn');
        const analysisEl = document.getElementById('diceAnalysis');
        
        resultEl.innerText = "投掷中...";
        rethinkBtn.style.display = 'none';
        analysisEl.style.display = 'none';
        
        let count = 0;
        const interval = setInterval(() => {
            const randomNum = Math.floor(Math.random() * 6) + 1;
            resultEl.innerText = `🎲 ${randomNum} 点`;
            count++;
            if (count > 10) {
                clearInterval(interval);
                const finalNumber = Math.floor(Math.random() * 6) + 1;
                const winner = diceOptions[finalNumber - 1];
                resultEl.innerText = `🎲 ${finalNumber} 点：${winner}`;
                
                lastDiceNumber = finalNumber;
                lastDiceResult = winner;
                
                rethinkBtn.style.display = 'block';
            }
        }, 80);
    }

    function showDiceAnalysis() {
        const analysisEl = document.getElementById('diceAnalysis');
        const rethinkBtn = document.getElementById('diceRethinkBtn');
        
        analysisEl.innerText = `看来你对「${lastDiceResult}」不太满意，这说明你潜意识里更倾向其他选项。重新投一次，或者遵从内心的选择吧！`;
        analysisEl.style.display = 'block';
        rethinkBtn.style.display = 'none';
    }

    // --- 6. 多选项转盘 ---
    let options = ['方案 A', '方案 B', '方案 C', '方案 D'];
    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#96CEB4', '#FFEEAD', '#D4A5A5', '#9B59B6'];
    let currentRotation = 0;
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');

    function drawWheel() {
        const numOptions = options.length;
        const arcSize = (2 * Math.PI) / numOptions;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < numOptions; i++) {
            const angle = i * arcSize;
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
            ctx.lineTo(centerX, centerY);
            ctx.fill();

            // 绘制文字
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(angle + arcSize / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 24px Arial";
            ctx.fillText(options[i], radius - 20, 10);
            ctx.restore();
        }
        updateOptionList();
    }

    function updateOptionList() {
        const list = document.getElementById('optionList');
        list.innerHTML = '';
        options.forEach((opt, index) => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.innerHTML = `${opt} <span onclick="removeOption(${index})">×</span>`;
            list.appendChild(tag);
        });
    }

    function addOption() {
        const input = document.getElementById('newOption');
        if (input.value.trim() && options.length < 10) {
            options.push(input.value.trim());
            input.value = '';
            drawWheel();
        } else if (options.length >= 10) {
            alert("最多支持10个选项哦！");
        }
    }

    function removeOption(index) {
        if (options.length > 2) {
            options.splice(index, 1);
            drawWheel();
        } else {
            alert("至少保留两个选项！");
        }
    }

    function spinWheel() {
        const resultEl = document.getElementById('wheelResult');
        resultEl.innerText = "旋转中...";
        
        // 随机旋转角度：至少转5圈 (360 * 5) + 随机角度
        const randomDegree = Math.floor(Math.random() * 360);
        const totalSpin = 1800 + randomDegree; 
        
        // 累加旋转角度，防止反转
        currentRotation += totalSpin; 
        
        canvas.style.transform = `rotate(-${currentRotation}deg)`;

        // 计算结果 (CSS旋转是逆时针，所以计算要对应)
        setTimeout(() => {
            const actualDegree = currentRotation % 360;
            const sliceAngle = 360 / options.length;
            // 指针在正上方(0度/360度)，Canvas绘制是从3点钟方向顺时针。
            // 经过换算，索引计算如下：
            const index = Math.floor(actualDegree / sliceAngle);
            // 因为指针在顶部，而绘制起点在右侧，需要做一个映射修正
            // 简单处理：Canvas rotate 负值，相当于指针顺时针走过这些角度
            // 正确的索引计算：
            const winningIndex = (options.length - Math.floor((actualDegree + 90) % 360 / sliceAngle)) % options.length;
            
            resultEl.innerText = "选中：" + options[winningIndex];
        }, 4000); // 对应 CSS transition 4s
    }

    // 初始化转盘
    drawWheel();

    // --- 7. 时间盲盒 ---
    function generateTimeBox() {
        const task = document.getElementById('taskName').value || "当前任务";
        const resultEl = document.getElementById('timeResult');
        
        // 生成 15 - 45 分钟的随机数
        const minutes = Math.floor(Math.random() * (45 - 15 + 1)) + 15;
        
        resultEl.innerHTML = `<span style="color:#ef4444; font-size:40px;">${minutes}</span> 分钟`;
        alert(`🔔 时间盲盒开启！\n\n任务：【${task}】\n时长：${minutes} 分钟\n\n规则：期间严禁看手机，立即开始！`);
    }
</script>
